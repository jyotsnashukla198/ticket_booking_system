apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticket-system
spec:
  replicas: 2                    # run 2 instances
  selector:
    matchLabels:
      app: ticket-system
  template:
    metadata:
      labels:
        app: ticket-system
    spec:
      initContainers:
        - name: migrate            # runs migrations before app starts
          image: ticket-system:latest
          command: ["npx", "prisma", "migrate", "deploy"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
      containers:
        - name: app
          image: ticket-system:latest
          command: ["node", "server.js"]
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
